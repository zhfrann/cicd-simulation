name: Java Maven CI/CD with SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: ["created"]

permissions:
  contents: read

jobs:
  ci:
    name: Continuous Integration - Test and SonarCloud Inspection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build, Test, and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=zhfrann_cicd-simulation
          -Dsonar.organization=zhfrann
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.qualitygate.wait=true

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-coverage-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  delivery:
    name: Continuous Delivery - Build JAR Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package application
        run: mvn -B -ntp clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: basic-java-maven-cicd-jar
          path: target/*.jar

  deployment:
    name: Continuous Deployment - Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 for GitHub Packages
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github

      - name: Publish package to GitHub Packages
        run: mvn -B -ntp deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
